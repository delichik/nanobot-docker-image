name: Build Nanobot Image

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nanobot

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest upstream commit
        id: upstream
        run: |
          COMMIT=$(git ls-remote https://github.com/HKUDS/nanobot.git refs/heads/main | awk '{print $1}')
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Check if image already exists
        id: check
        run: |
          TAG=${{ steps.upstream.outputs.commit }}

          if docker manifest inspect $IMAGE_NAME:$TAG > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if image already built
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Image already exists. Skip build."
          exit 0

      - name: Clone nanobot
        run: |
          git clone https://github.com/HKUDS/nanobot.git
          cd nanobot
          git checkout ${{ steps.upstream.outputs.commit }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          TAG=${{ steps.upstream.outputs.commit }}

          docker build \
            -t $IMAGE_NAME:$TAG \
            -t $IMAGE_NAME:latest \
            nanobot

      - name: Push image
        run: |
          TAG=${{ steps.upstream.outputs.commit }}

          docker push $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:latest

  cleanup:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Delete old images (keep 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: nanobot
          package-type: container
          min-versions-to-keep: 3
